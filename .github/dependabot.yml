version: 2
updates:
  # ─── Node.js apps ────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /apps/ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      production:
        dependency-type: production
        update-types: ["minor", "patch"]
      dev:
        dependency-type: development
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /apps/worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      all:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /apps/migrate
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      all:
        patterns: ["*"]

  # ─── Python services ─────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /gateway
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /gateway/embedder
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /gateway/file-processor
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      all:
        patterns: ["*"]

  # ─── Docker base images ──────────────────────────────────────────
  - package-ecosystem: docker
    directory: /gateway
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /gateway/dispatcher
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /gateway/runner
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /gateway/embedder
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /gateway/file-processor
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /apps/ui
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /apps/worker
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  # ─── GitHub Actions ──────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
