version: 2
updates:
  # ─── Node.js apps ────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /apps/ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next:
        patterns: ["next", "@next/*", "eslint-config-next"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      radix:
        patterns: ["@radix-ui/*", "radix-ui"]
      tanstack:
        patterns: ["@tanstack/*"]
      supabase:
        patterns: ["@supabase/*"]
      tiptap:
        patterns: ["@tiptap/*"]
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint", "eslint-*", "@eslint/*"]

  - package-ecosystem: npm
    directory: /apps/worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /apps/migrate
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # ─── Python services ─────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /gateway
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /gateway/embedder
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /gateway/file-processor
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # ─── Docker base images ──────────────────────────────────────────
  - package-ecosystem: docker
    directory: /gateway
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /gateway/dispatcher
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /gateway/runner
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /gateway/embedder
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /gateway/file-processor
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /apps/ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /apps/worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  # ─── GitHub Actions ──────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
