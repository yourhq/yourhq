name: Deploy hosted

on:
  workflow_run:
    workflows: ["Publish images"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-hosted
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2
        id: ecr-login

      - name: Resolve image tag
        id: tag
        env:
          REF: ${{ github.event.workflow_run.head_branch || 'latest' }}
        run: |
          if [[ "$REF" == v* ]]; then
            echo "image_tag=${REF#v}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to ECS Express
        uses: aws-actions/amazon-ecs-deploy-express-service@2088fb17efe80c13c2e40a6a1a7e4a4b12f88041 # v1
        with:
          service-name: yourhq-worker
          image: ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_WORKER_REPOSITORY || 'yourhq-worker' }}:${{ steps.tag.outputs.image_tag }}
          execution-role-arn: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
          container-port: 3001
          cpu: "256"
          memory: "512"
          health-check-path: /health
          min-task-count: 1
          max-task-count: 1
          secrets: |
            [
              {"name": "MASTER_SUPABASE_URL", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:MASTER_SUPABASE_URL::"},
              {"name": "MASTER_SUPABASE_SERVICE_ROLE_KEY", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:MASTER_SUPABASE_SERVICE_ROLE_KEY::"},
              {"name": "SUPABASE_MANAGEMENT_API_TOKEN", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:SUPABASE_MANAGEMENT_API_TOKEN::"},
              {"name": "SUPABASE_ORG_ID", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:SUPABASE_ORG_ID::"},
              {"name": "STRIPE_SECRET_KEY", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:STRIPE_SECRET_KEY::"},
              {"name": "STRIPE_WEBHOOK_SECRET", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:STRIPE_WEBHOOK_SECRET::"},
              {"name": "STRIPE_PRICE_ID", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:STRIPE_PRICE_ID::"},
              {"name": "WORKER_INTERNAL_TOKEN", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:WORKER_INTERNAL_TOKEN::"},
              {"name": "HOSTED_SECRETS_KEY", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:HOSTED_SECRETS_KEY::"},
              {"name": "E2B_API_KEY", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:E2B_API_KEY::"},
              {"name": "PUBLIC_SITE_URL", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:PUBLIC_SITE_URL::"},
              {"name": "RESEND_API_KEY", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:RESEND_API_KEY::"},
              {"name": "SENTRY_DSN", "valueFrom": "${{ secrets.WORKER_SECRET_ARN }}:SENTRY_DSN::"}
            ]

  deploy-ui:
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Trigger Vercel deploy
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
