name: Deploy hosted

on:
  workflow_run:
    workflows: ["Publish images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hosted
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Deploy to ECS Express
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: yourhq-worker
          image: ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_WORKER_REPOSITORY || 'yourhq-worker' }}:latest
          execution-role-arn: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
          container-port: 3001
          cpu: "256"
          memory: "512"
          health-check-path: /health
          min-task-count: 1
          max-task-count: 1
