name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  mintlify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Mintlify CLI
        run: npm i -g mint
      - name: Validate docs
        run: mint validate
      - name: Check broken links
        run: mint broken-links
