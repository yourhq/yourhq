name: CI — Main Gate

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  db-contracts:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run DB contract tests
        env:
          TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/hq_test"
        run: bash db/tests/run-db-tests.sh

  coverage-report:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"
      - run: npm ci --legacy-peer-deps
        working-directory: apps/ui
      - run: pip install -e '.[test]'
      - name: UI coverage
        working-directory: apps/ui
        run: npx vitest run --coverage
      - name: Gateway coverage
        run: pytest gateway/tests -x -q --cov=gateway --cov-report=term-missing
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: |
            apps/ui/coverage/
          retention-days: 14
