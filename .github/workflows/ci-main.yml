name: CI — Main Gate

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  db-contracts:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Run DB contract tests
        env:
          TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/hq_test"
        run: bash db/tests/run-db-tests.sh

  coverage-report:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - run: npm ci --legacy-peer-deps
        working-directory: apps/ui
      - run: pip install -e '.[test]'
      - name: UI coverage
        working-directory: apps/ui
        run: npx vitest run --coverage
      - name: Gateway coverage
        run: pytest gateway/tests -x -q --cov=gateway --cov-report=term-missing
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/ui/coverage/
          retention-days: 14
