name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: CI only needs to read the repo. No secrets are used here.
permissions:
  contents: read

jobs:
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/worker/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check gateway/ templates/"
          src: "."
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check gateway/ templates/"
          src: "."

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./gateway/scripts"
          severity: warning
      - name: ShellCheck entrypoint + installer
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: "./gateway/entrypoint.sh ./installer/install.sh"
          severity: warning
