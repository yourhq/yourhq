name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ui-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint

  ui-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run

  ui-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/worker/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check gateway/ templates/"
          src: "."
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check gateway/ templates/"
          src: "."

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - run: pip install -e '.[test]'
      - run: pytest gateway/tests -x -q

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck gateway scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./gateway/scripts"
          severity: warning
      - name: ShellCheck entrypoint + installer
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: "./gateway/entrypoint.sh ./installer/install.sh"
          severity: warning

  shell-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash gateway/scripts/tests/run-shell-tests.sh
