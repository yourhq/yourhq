name: Publish images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to apply"
        required: false
        default: ""

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Phase 1: Determine which images need rebuilding ────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build-matrix: ${{ steps.set-matrix.outputs.build-matrix }}
      manifest-matrix: ${{ steps.set-matrix.outputs.manifest-matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
        with:
          filters: |
            yourhq-ui:
              - 'apps/ui/**'
              - 'db/migrations/**'
            yourhq-gateway:
              - 'gateway/Dockerfile'
              - 'gateway/entrypoint.sh'
              - 'gateway/daemons/**'
              - 'gateway/embedder/**'
              - 'gateway/lifecycle/**'
              - 'gateway/scripts/**'
              - 'templates/**'
            yourhq-dispatcher:
              - 'gateway/dispatcher/**'
              - 'gateway/daemons/inbox_dispatcher.py'
            yourhq-runner:
              - 'gateway/runner/**'
              - 'gateway/daemons/command_runner.py'
            yourhq-embedder:
              - 'gateway/embedder/**'
            yourhq-file-processor:
              - 'gateway/file-processor/**'
              - 'gateway/daemons/file_processor.py'
            yourhq-worker:
              - 'apps/worker/**'

      - name: Build matrices
        id: set-matrix
        env:
          FORCE_ALL: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
          FILTER_UI: ${{ steps.filter.outputs.yourhq-ui }}
          FILTER_GATEWAY: ${{ steps.filter.outputs.yourhq-gateway }}
          FILTER_DISPATCHER: ${{ steps.filter.outputs.yourhq-dispatcher }}
          FILTER_RUNNER: ${{ steps.filter.outputs.yourhq-runner }}
          FILTER_EMBEDDER: ${{ steps.filter.outputs.yourhq-embedder }}
          FILTER_FILE_PROCESSOR: ${{ steps.filter.outputs.yourhq-file-processor }}
          FILTER_WORKER: ${{ steps.filter.outputs.yourhq-worker }}
        run: |
          declare -A DOCKERFILES=(
            [yourhq-ui]="apps/ui/Dockerfile"
            [yourhq-gateway]="gateway/Dockerfile"
            [yourhq-dispatcher]="gateway/dispatcher/Dockerfile"
            [yourhq-runner]="gateway/runner/Dockerfile"
            [yourhq-embedder]="gateway/embedder/Dockerfile"
            [yourhq-file-processor]="gateway/file-processor/Dockerfile"
            [yourhq-worker]="apps/worker/Dockerfile"
          )
          declare -A FILTERS=(
            [yourhq-ui]="$FILTER_UI"
            [yourhq-gateway]="$FILTER_GATEWAY"
            [yourhq-dispatcher]="$FILTER_DISPATCHER"
            [yourhq-runner]="$FILTER_RUNNER"
            [yourhq-embedder]="$FILTER_EMBEDDER"
            [yourhq-file-processor]="$FILTER_FILE_PROCESSOR"
            [yourhq-worker]="$FILTER_WORKER"
          )

          ALL_IMAGES="yourhq-ui yourhq-gateway yourhq-dispatcher yourhq-runner yourhq-embedder yourhq-file-processor yourhq-worker"

          BUILD_ITEMS="[]"
          MANIFEST_ITEMS="[]"

          # TODO(oss-launch): change ARM64_RUNNER to "ubuntu-24.04-arm" once repo is public,
          # then remove the QEMU setup step (if: matrix.arch_slug == 'arm64') in the build job.
          ARM64_RUNNER="ubuntu-latest"

          for img in $ALL_IMAGES; do
            changed="${FILTERS[$img]}"
            if [[ "$FORCE_ALL" == "true" || "$changed" == "true" ]]; then
              dockerfile="${DOCKERFILES[$img]}"
              BUILD_ITEMS=$(echo "$BUILD_ITEMS" | jq -c \
                --arg name "$img" \
                --arg dockerfile "$dockerfile" \
                --arg arm64_runner "$ARM64_RUNNER" \
                '. + [
                  {name: $name, dockerfile: $dockerfile, platform: "linux/amd64", runner: "ubuntu-latest", arch_slug: "amd64"},
                  {name: $name, dockerfile: $dockerfile, platform: "linux/arm64", runner: $arm64_runner, arch_slug: "arm64"}
                ]')
              MANIFEST_ITEMS=$(echo "$MANIFEST_ITEMS" | jq -c \
                --arg name "$img" \
                '. + [{name: $name}]')
            fi
          done

          HAS_CHANGES="false"
          if [[ $(echo "$MANIFEST_ITEMS" | jq 'length') -gt 0 ]]; then
            HAS_CHANGES="true"
          fi

          echo "build-matrix={\"include\":$BUILD_ITEMS}" >> "$GITHUB_OUTPUT"
          echo "manifest-matrix={\"include\":$MANIFEST_ITEMS}" >> "$GITHUB_OUTPUT"
          echo "has-changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

  # ─── Phase 2: Native per-architecture builds ────────────────────
  build:
    needs: changes
    if: needs.changes.outputs.has-changes == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.build-matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # TODO(oss-launch): remove this step once arm64 builds use a native runner
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        if: matrix.arch_slug == 'arm64'

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch_slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch_slug }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "$digest" > "/tmp/digests/${{ matrix.arch_slug }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.name }}-${{ matrix.arch_slug }}
          path: /tmp/digests/${{ matrix.arch_slug }}
          if-no-files-found: error
          retention-days: 1

  # ─── Phase 3: Assemble multi-arch manifest and apply tags ───────
  manifest:
    needs: [changes, build]
    if: needs.changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.manifest-matrix) }}
    steps:
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-${{ matrix.name }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and push manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}"
          AMD64_DIGEST=$(cat /tmp/digests/amd64)
          ARM64_DIGEST=$(cat /tmp/digests/arm64)

          TAG_ARGS=""
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            TAG_ARGS="$TAG_ARGS --tag $tag"
          done <<< "${{ steps.meta.outputs.tags }}"

          docker buildx imagetools create $TAG_ARGS \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"

  # ─── Phase 4: Push Worker image to ECR for ECS Express ──────────
  ecr-push:
    needs: [changes, manifest]
    if: >-
      needs.changes.outputs.has-changes == 'true' &&
      contains(toJSON(fromJSON(needs.changes.outputs.manifest-matrix).include.*.name), 'yourhq-worker')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        id: ecr-login

      - name: Pull from GHCR and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_WORKER_REPOSITORY || 'yourhq-worker' }}
        run: |
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/yourhq-worker:latest"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)

          docker pull "${GHCR_IMAGE}"
          docker tag "${GHCR_IMAGE}" "${ECR_IMAGE}:latest"
          docker tag "${GHCR_IMAGE}" "${ECR_IMAGE}:${SHORT_SHA}"
          docker push "${ECR_IMAGE}:latest"
          docker push "${ECR_IMAGE}:${SHORT_SHA}"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            SEMVER="${GITHUB_REF#refs/tags/v}"
            docker tag "${GHCR_IMAGE}" "${ECR_IMAGE}:${SEMVER}"
            docker push "${ECR_IMAGE}:${SEMVER}"
          fi
