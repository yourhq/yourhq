# =============================================================================
# HQ — main Compose stack (UI + gateway + dispatcher + runner + embedder).
#
# The installer only starts `ui` by default (~200 MB). Gateway services
# move to the `gateway` profile so they only pull + run on machines that
# actually host agents — a laptop that onboards a remote gateway never
# downloads the 2 GB gateway image.
#
# Quick start:
#   curl -fsSL install.yourhq.ai | bash      # runs `docker compose up -d ui`
#
# UI + local gateway (same host):
#   docker compose --profile gateway up -d
#
# Gateway-only (remote machine):
#   curl -fsSL install.yourhq.ai/gateway | GATEWAY_TOKEN=... bash
#
# Explicit service list (anywhere):
#   docker compose up -d ui
#   docker compose up -d gateway dispatcher runner embedder
# =============================================================================

name: ${COMPOSE_PROJECT:-yourhq}

x-gateway-env: &gateway-env
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  EMBEDDER_URL: ${EMBEDDER_URL:-http://embedder:18801}
  # Override with a different fastembed-compatible model; non-default models download on first boot
  EMBEDDER_MODEL: ${EMBEDDER_MODEL:-BAAI/bge-small-en-v1.5}
  WORKSPACE_SLUG: ${WORKSPACE_SLUG:-}
  GATEWAY_ID: ${GATEWAY_ID:-default}
  GATEWAY_LABEL: ${GATEWAY_LABEL:-Primary gateway}
  COMPOSE_PROJECT: ${COMPOSE_PROJECT:-yourhq}
  # Connections — when "local", the user's browser is on the same
  # machine as the gateway, so openclaw's native localhost:1455
  # callback works and we let the auth flow auto-complete. Otherwise
  # we pre-occupy 1455 to force paste-mode.
  NETWORKING_MODE: ${NETWORKING_MODE:-local}
  # Sidecar containers (dispatcher, runner) connect to the gateway via
  # ws:// over Docker's internal network. OpenClaw rejects plaintext ws://
  # to non-loopback addresses by default; this is safe here because the
  # traffic never leaves the Docker bridge.
  OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"

services:

  ui:
    image: ${UI_IMAGE:-ghcr.io/yourhq/yourhq-ui:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    container_name: ${COMPOSE_PROJECT:-yourhq}-ui
    restart: unless-stopped
    environment:
      # Supabase creds are runtime, per-workspace, from the registry volume
      # (/config/workspaces.json + /config/secrets.json). No build-time or
      # compose-time Supabase env vars needed — the same image works for
      # any user after they connect a workspace via the onboarding screen.
      # Gateway file-browser: UI talks directly to the gateway's files-API
      # over the Docker internal network (default) or Tailscale.
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:18790}
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN:-}
      # Hosted mode — set DEPLOYMENT_MODE=hosted to enable hosted UI routes.
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-}
      WORKER_URL: ${WORKER_URL:-http://worker:3001}
      WORKER_INTERNAL_TOKEN: ${WORKER_INTERNAL_TOKEN:-}
      # Reverse-proxy origin allowlist (Codespaces, VPS behind nginx, etc.)
      CODESPACE_NAME: ${CODESPACE_NAME:-}
      GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN: ${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      # Defaults to loopback-only so a bare `docker compose up` on a cloud VM
      # doesn't silently expose the UI to the public internet. The installer
      # flips this to 0.0.0.0:3000 when the user picks Tailscale or Public mode.
      - "${UI_HOST_PORT:-127.0.0.1:3000}:3000"
    volumes:
      - ui-config:/config
      # Docker socket — lets the UI start/stop the gateway profile on-demand
      # when the user picks "run agents on this machine" during onboarding.
      # Single-user self-hosted product; no multi-tenant concerns.
      - /var/run/docker.sock:/var/run/docker.sock
      # Compose file + env — mounted so the UI container can run
      # `docker compose --profile gateway up/stop` via local-compose.ts.
      - ./docker-compose.yml:/compose/docker-compose.yml:ro
      - ./.env:/compose/.env:ro
      # Host Docker config — needed so pulls from inside the container
      # authenticate to GHCR with the host user's credentials.
      - ${DOCKER_CONFIG:-${HOME}/.docker}:/host-docker-config:ro
      # Host Tailscale socket (read-only). Used by the onboarding flow +
      # Settings → Networking to detect whether the user has Tailscale
      # running on the host and, if so, what address HQ is reachable at.
      # Mount is optional — if the path doesn't exist on the host, Compose
      # creates it as an empty directory and the UI falls back to "not
      # installed." On macOS Docker Desktop this path is relative to the
      # VM, not the host. The TAILSCALE_SOCKET env var lets users override.
      - ${TAILSCALE_SOCKET_HOST:-/var/run/tailscale}:/var/run/tailscale:ro

  gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/yourhq/yourhq-gateway:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: ${COMPOSE_PROJECT:-yourhq}-gateway
    restart: unless-stopped
    profiles: [gateway]
    environment:
      <<: *gateway-env
      GIT_REMOTE_URL: ${GIT_REMOTE_URL:-}
      GIT_DEPLOY_KEY: ${GIT_DEPLOY_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-}
      TEMPLATES_SOURCE: ${TEMPLATES_SOURCE:-}
      # Files-API (gateway-side HTTP for the UI file browser)
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:-}
      GATEWAY_AUTH_TOKEN: ${GATEWAY_AUTH_TOKEN:-}
      FILES_API_BIND: ${FILES_API_BIND:-docker}
      FILES_API_PORT: ${FILES_API_PORT:-18790}
      # noVNC
      NOVNC_BIND: ${NOVNC_BIND:-local}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      # Reachable URL — set by the installer from the HOST's networking
      # mode. Used when registering this gateway in Supabase so the UI
      # knows how to reach it. (NETWORKING_MODE inherits from x-gateway-env.)
      HOST_REACHABLE_URL: ${HOST_REACHABLE_URL:-http://localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18790/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Chrome crashes on small /dev/shm in container mode. openclaw's managed
    # browser launcher does not pass --disable-dev-shm-usage, so we give it
    # enough shm to operate normally.
    shm_size: 2gb
    volumes:
      - gateway-state:/home/openclaw/.openclaw
      - gateway-chrome-profile:/home/openclaw/.config/google-chrome
      # Read-only view of the UI's project registry. If SUPABASE_URL isn't
      # set in .env, the entrypoint reads active-project creds from here.
      # Lets the gateway come up without .env edits after the user onboards
      # in the browser.
      - ui-config:/config:ro
    ports:
      # Files-API defaults to loopback-only so a bare `docker compose up` on
      # a cloud VM doesn't silently expose it. The installer flips this to
      # 0.0.0.0 when the user picks Tailscale or Public mode.
      - "${FILES_API_HOST_PORT:-127.0.0.1:18790}:18790"
      # noVNC: exposed only when NOVNC_HOST_PORT is set (remote/public
      # gateways). Co-located setups proxy through the UI container instead.
      - "${NOVNC_HOST_PORT:-127.0.0.1:6901}:6901"

  dispatcher:
    image: ${DISPATCHER_IMAGE:-ghcr.io/yourhq/yourhq-dispatcher:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: gateway/dispatcher/Dockerfile
    container_name: ${COMPOSE_PROJECT:-yourhq}-dispatcher
    restart: unless-stopped
    profiles: [gateway]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/heartbeat.txt && test $$(( $$(date +%s) - $$(date -d \"$$(cat /tmp/heartbeat.txt)\" +%s 2>/dev/null || echo 0) )) -lt 90"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - gateway
    environment:
      <<: *gateway-env
      RECONCILE_INTERVAL: ${RECONCILE_INTERVAL:-60}
      WAKE_COOLDOWN: ${WAKE_COOLDOWN:-30}
    volumes:
      - gateway-state:/home/openclaw/.openclaw
      # Read-only view of the UI's project registry for the same reason as
      # the gateway: registry-as-fallback when .env SUPABASE_* is empty.
      - ui-config:/config:ro

  runner:
    image: ${RUNNER_IMAGE:-ghcr.io/yourhq/yourhq-runner:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: gateway/runner/Dockerfile
    container_name: ${COMPOSE_PROJECT:-yourhq}-runner
    restart: unless-stopped
    profiles: [gateway]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/heartbeat.txt && test $$(( $$(date +%s) - $$(date -d \"$$(cat /tmp/heartbeat.txt)\" +%s 2>/dev/null || echo 0) )) -lt 90"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - gateway
    environment:
      <<: *gateway-env
      RUNTIME_MODE: docker
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      COMMAND_TIMEOUT: ${COMMAND_TIMEOUT:-120}
      # Git backup sweep: commits dirty worktrees + fast-forwards branches.
      # Set to 0 to disable (manual/event-driven commits still work).
      GIT_SYNC_INTERVAL: ${GIT_SYNC_INTERVAL:-1800}
    volumes:
      - gateway-state:/home/openclaw/.openclaw
      # Read-only view of the UI's project registry — same pattern as
      # gateway + dispatcher.
      - ui-config:/config:ro
      # Docker socket for sibling-container restarts (restart_gateway,
      # restart_dispatcher, update_self actions).
      - /var/run/docker.sock:/var/run/docker.sock

  embedder:
    image: ${EMBEDDER_IMAGE:-ghcr.io/yourhq/yourhq-embedder:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: gateway/embedder/Dockerfile
    container_name: ${COMPOSE_PROJECT:-yourhq}-embedder
    restart: unless-stopped
    profiles: [gateway]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18801/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      <<: *gateway-env
      EMBEDDER_HOST: 0.0.0.0
      EMBEDDER_PORT: 18801
      EMBEDDER_CACHE_DIR: /models
      EMBEDDER_POLL_INTERVAL: ${EMBEDDER_POLL_INTERVAL:-10}
      EMBEDDER_BATCH_SIZE: ${EMBEDDER_BATCH_SIZE:-8}
      EMBEDDER_CHUNK_CHARS: ${EMBEDDER_CHUNK_CHARS:-3500}
      EMBEDDER_CHUNK_OVERLAP: ${EMBEDDER_CHUNK_OVERLAP:-500}
      EMBEDDER_MAX_CHUNKS: ${EMBEDDER_MAX_CHUNKS:-500}
    volumes:
      - gateway-embedding-cache:/models
      - ui-config:/config:ro

  file-processor:
    image: ${FILE_PROCESSOR_IMAGE:-ghcr.io/yourhq/yourhq-file-processor:${IMAGE_TAG:-latest}}
    build:
      context: .
      dockerfile: gateway/file-processor/Dockerfile
    container_name: ${COMPOSE_PROJECT:-yourhq}-file-processor
    restart: unless-stopped
    profiles: [gateway]
    environment:
      <<: *gateway-env
      FILE_PROCESS_INTERVAL: ${FILE_PROCESS_INTERVAL:-30}
      FILE_PROCESS_BATCH_SIZE: ${FILE_PROCESS_BATCH_SIZE:-5}
      FILE_PROCESS_LEASE_SEC: ${FILE_PROCESS_LEASE_SEC:-300}
    volumes:
      - ui-config:/config:ro

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: ${COMPOSE_PROJECT:-yourhq}-worker
    restart: unless-stopped
    profiles: [hosted]
    environment:
      PORT: "3001"
      MASTER_SUPABASE_URL: ${MASTER_SUPABASE_URL:-}
      MASTER_SUPABASE_SERVICE_ROLE_KEY: ${MASTER_SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_MANAGEMENT_API_TOKEN: ${SUPABASE_MANAGEMENT_API_TOKEN:-}
      SUPABASE_ORG_ID: ${SUPABASE_ORG_ID:-}
      SUPABASE_REGION: ${SUPABASE_REGION:-us-east-1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      WORKER_INTERNAL_TOKEN: ${WORKER_INTERNAL_TOKEN:-}
      HOSTED_SECRETS_KEY: ${HOSTED_SECRETS_KEY:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
      E2B_TEMPLATE_NAME: ${E2B_TEMPLATE_NAME:-yourhq-gateway}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "${WORKER_HOST_PORT:-127.0.0.1:3001}:3001"

volumes:
  ui-config:
    name: ${COMPOSE_PROJECT:-yourhq}-ui-config
  gateway-state:
    name: ${COMPOSE_PROJECT:-yourhq}-gateway-state
  gateway-chrome-profile:
    name: ${COMPOSE_PROJECT:-yourhq}-gateway-chrome-profile
  gateway-embedding-cache:
    name: ${COMPOSE_PROJECT:-yourhq}-gateway-embedding-cache
